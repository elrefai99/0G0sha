upstream gosha_backend {
     server gosha-app:9999;
     keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# Redirect HTTP → HTTPS
server {
     listen 80;
     listen [::]:80;
     server_name api.0gosha.com;

     # Certbot challenge
     location /.well-known/acme-challenge/ {
          root /var/www/certbot;
     }

     location / {
          return 301 https://$host$request_uri;
     }
}

server {
     listen 443 ssl http2;
     listen [::]:443 ssl http2;
     server_name api.0gosha.com;

     # ── SSL (Certbot) ─────────────────────────────────────
     ssl_certificate /etc/letsencrypt/live/api.0gosha.com/fullchain.pem;
     ssl_certificate_key /etc/letsencrypt/live/api.0gosha.com/privkey.pem;
     ssl_protocols TLSv1.2 TLSv1.3;
     ssl_ciphers HIGH:!aNULL:!MD5;
     ssl_prefer_server_ciphers on;
     ssl_session_cache shared:SSL:10m;
     ssl_session_timeout 1d;
     ssl_session_tickets off;

     # ── Security headers ──────────────────────────────────
     server_tokens off;
     add_header X-XSS-Protection "1; mode=block" always;
     add_header X-Content-Type-Options "nosniff" always;
     add_header X-Frame-Options "SAMEORIGIN" always;
     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

     client_max_body_size 75M;

     # ── API routes ────────────────────────────────────────
     location /api/ {
          limit_req zone=api_limit burst=50 nodelay;

          proxy_pass http://gosha_backend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Connection "";
          proxy_buffering off;
     }

     # ── Auth routes (stricter rate limit) ─────────────────
     location /api/v1/auth/ {
          limit_req zone=auth_limit burst=3 nodelay;

          proxy_pass http://gosha_backend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Connection "";
          proxy_buffering off;
     }

     # ── SSE notifications (long-lived, no buffering) ──────
     location /api/v1/notifications/stream {
          proxy_pass http://gosha_backend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Connection "";

          # SSE: disable all buffering + caching
          proxy_buffering off;
          proxy_cache off;
          proxy_request_buffering off;
          chunked_transfer_encoding off;

          # Keep connection alive for SSE
          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;
     }

     # ── Socket.IO (WebSocket upgrade) ─────────────────────
     location /socket.io/ {
          proxy_pass http://gosha_backend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # WebSocket upgrade
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";

          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;
     }

     # ── Swagger docs ──────────────────────────────────────
     location /api-docs {
          proxy_pass http://gosha_backend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
     }

     # ── Metrics (internal only — block external access) ───
     location /metrics {
          deny all;
          return 403;
     }

     # ── Static CDN assets ─────────────────────────────────
     location /v0/ {
          proxy_pass http://gosha_backend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;

          # Cache static assets
          proxy_cache_valid 200 1d;
          expires 7d;
          add_header Cache-Control "public, immutable";
     }

     # ── Health check (Nginx → app) ────────────────────────
     location = /api/health {
          proxy_pass http://gosha_backend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          access_log off;
     }
}
